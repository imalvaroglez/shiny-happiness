name: FinanceTracker
options:
  bundleIdPrefix: com.financeTracker
  deploymentTarget:
    macOS: "26.0"
  xcodeVersion: "26.0"
  minimumXcodeGenVersion: "2.40"
  generateEmptyDirectories: true
  groupSortPosition: top

settings:
  base:
    ARCHS: arm64
    ONLY_ACTIVE_ARCH: YES
    SWIFT_VERSION: "6.0"
    MACOSX_DEPLOYMENT_TARGET: "26.0"
    GENERATE_INFOPLIST_FILE: YES
    INFOPLIST_KEY_LSApplicationCategoryType: "public.app-category.finance"
    SWIFT_STRICT_CONCURRENCY: complete
    ENABLE_PREVIEWS: YES

targets:
  FinanceTracker:
    type: application
    platform: macOS
    sources:
      - path: FinanceTracker
        excludes:
          - "**/*.json"
      - path: FinanceTracker/Ingest/SeedData
        buildPhase: resources
        excludes:
          - "**/*.swift"
      - path: FinanceTracker/Ingest/StructuralParser/Knowledge
        buildPhase: resources
        excludes:
          - "**/*.swift"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.financeTracker.app
        INFOPLIST_KEY_CFBundleDisplayName: "FinanceTracker"
        INFOPLIST_KEY_LSMinimumSystemVersion: "26.0"
        MARKETING_VERSION: "0.3.1"
        CURRENT_PROJECT_VERSION: "20260606.1"
        CODE_SIGN_ENTITLEMENTS: ""
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ENABLE_APP_SANDBOX: YES
        APP_SANDBOX_INPUT_FILE: YES
        APP_SANDBOX_OUTPUT_FILE: YES
        COMBINE_HIDPI_IMAGES: YES
        HARDENED_RUNTIME: YES
        ENABLE_USER_SCRIPT_SANDBOXING: NO
    entitlements:
      path: FinanceTracker/FinanceTracker.entitlements
      properties:
        com.apple.security.app-sandbox: true
        com.apple.security.files.user-selected.read-write: true
        com.apple.security.network.client: true
    dependencies: []

  FinanceTrackerTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: FinanceTrackerTests
      - path: FinanceTracker/Ingest/SeedData
        buildPhase: resources
        excludes:
          - "**/*.swift"
      - path: FinanceTracker/Ingest/StructuralParser/Knowledge
        buildPhase: resources
        excludes:
          - "**/*.swift"
    dependencies:
      - target: FinanceTracker
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.financeTracker.app.tests
        GENERATE_INFOPLIST_FILE: YES
        ENABLE_APP_SANDBOX: NO
